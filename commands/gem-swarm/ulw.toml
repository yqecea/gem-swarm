| User prompt | `ask_user` |

## ULTRAWORK Overrides

These overrides apply ON TOP of the standard orchestration steps. They do NOT replace the steps — they modify specific gates and behaviors.

### Execution Mode Override
- Skip the Execution Mode Gate entirely. ULW always uses parallel execution.
- Set `execution_mode: 'parallel'`, `execution_backend: 'native'` immediately during session creation.
- Set `GEM_SWARM_MAX_CONCURRENT` to `0` (dispatch entire batch, no slicing).

### Aggressive Parallelization
- When planning phases, apply Same-Agent Decomposition even when the 70% threshold is NOT met. Decompose by deliverable whenever 2+ independent file sets exist within a single agent's scope.
- Maximize batch width: flatten dependency depths aggressively. If Phase B only needs a TYPE from Phase A (not the implementation), mark them parallel and pass the type definition inline.
- Allow the SAME agent to appear in up to 8 parallel phases (standard mode caps at 4). Each must own non-overlapping files.
- Review phases run as 3 parallel instances minimum (responsive, design compliance, a11y+perf).

### Protocol Cascade
Every delegation prompt in ULW mode MUST include this header:

```
[ULTRAWORK ACTIVE]
Mode: Maximum Intensity
Gate: Build → Test → Output → Integration
```

This signals the subagent to:
1. Apply Pre-Implementation Gate: verify which files to modify, have a plan, zero ambiguity before coding.
2. Apply Zero Excuses: deliver FULL implementation, no "simplified version", no "extend later".
3. Apply Anti-Rationalization Shield: do not say "this should work" — run it, verify it.
4. Apply Manual QA Mandate: after coding, RUN the actual feature. Type checks are necessary but insufficient.
5. Apply Anti-AI-Filler: no TODO comments, no `@ts-ignore`, no empty catch blocks, no AI slop in comments.
6. Apply No Partial Completion: every file must be complete. No placeholders, no stubs.

### Approval Gate Reduction
- Design depth: default to "Quick" unless task is genuinely complex.
- Plan approval: present plan and proceed immediately if no objections within the same turn. Do NOT wait for a separate approval turn — use a single confirmation prompt and proceed on approval.
- Code review: run in parallel with archive preparation, not sequentially.

### Quality Escalation
- Verification Gates are MANDATORY for every phase: Build gate + Test gate + Output gate + Integration gate.
- If a subagent reports "task complete" without running verification, mark the phase as INCOMPLETE and re-delegate.
- Zero tolerance for partial completion: any phase with TODO/placeholder/stub tokens is auto-failed.

## Execute

Call `get_skill_content` with resources: ["orchestration-steps"].

Follow the returned step sequence, applying the ULTRAWORK Overrides listed above at each relevant step. The overrides modify gates and behavior but do NOT skip structural steps (session creation, state management, handoff parsing).

Key step modifications:
- Step 3: Set execution_mode to parallel immediately, no gate needed.
- Step 10: Default design depth to Quick.
- Step 16: Single-turn approval with immediate proceed.
- Step 18-19: Skip execution mode gate. Already set to parallel.
- Step 22: Inject [ULTRAWORK ACTIVE] header into every delegation prompt.
- Step 22: Apply aggressive Same-Agent Decomposition regardless of 70% threshold.
- Step 26-27: Review batch runs 3+ parallel instances."""
