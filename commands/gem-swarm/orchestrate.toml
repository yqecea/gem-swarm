|--------|-----|
| Load skill | `get_skill_content(resources: ["<name>"])` |
| Delegate to agent | Call agent tool by name: `frontend_specialist(query: "...")`, `test_engineer(query: "...")` |
| MCP tools | `mcp_gem-swarm_<tool_name>` |
| User prompt | `ask_user` |

## Execute

Call `get_skill_content` with resources: ["orchestration-steps"].

Follow the returned step sequence exactly. The steps are the sole procedural authority — do not improvise, skip, or reorder them."""
